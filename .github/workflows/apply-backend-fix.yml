name: apply backend compilation fix

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Disambiguate JdbcTemplate callback and remove one-time workflow
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('backend/src/main/java/dev/relay/repository/JobRepository.java')
          text = path.read_text()
          old = '""", rs -> counts.put(rs.getString("status"), rs.getLong("count")));'
          new = '""", (org.springframework.jdbc.core.RowCallbackHandler) rs -> counts.put(rs.getString("status"), rs.getLong("count")));'
          if old not in text:
              raise SystemExit('Expected ambiguous JdbcTemplate callback not found')
          path.write_text(text.replace(old, new, 1))
          Path('.github/workflows/apply-backend-fix.yml').unlink()
          PY
      - name: Commit backend fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/src/main/java/dev/relay/repository/JobRepository.java .github/workflows/apply-backend-fix.yml
          git commit -m "fix: disambiguate JdbcTemplate row callback"
          git push origin HEAD:main
