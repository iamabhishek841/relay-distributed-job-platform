# Fully Render-managed alternative. Free Render Postgres expires after 30 days.
services:
  - type: web
    name: relay-platform
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: relay-postgres
          property: connectionString
      - key: RELAY_WORKER_COUNT
        value: "8"
      - key: RELAY_LEASE_SECONDS
        value: "10"
      - key: RELAY_HEARTBEAT_SECONDS
        value: "2"
      - key: RELAY_EVENT_SAMPLE_RATE
        value: "0.08"
      - key: DB_POOL_SIZE
        value: "12"
      - key: JAVA_OPTS
        value: "-XX:MaxRAMPercentage=75.0"

databases:
  - name: relay-postgres
    plan: free
    postgresMajorVersion: "18"
    databaseName: relay
    user: relay
