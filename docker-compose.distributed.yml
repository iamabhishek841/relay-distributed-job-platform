services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: relay
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay
    ports:
      - "5432:5432"
    volumes:
      - relay-distributed-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relay -d relay"]
      interval: 3s
      timeout: 3s
      retries: 20

  relay-api:
    build:
      context: .
    environment:
      RELAY_DB_URL: jdbc:postgresql://postgres:5432/relay
      RELAY_DB_USER: relay
      RELAY_DB_PASSWORD: relay
      RELAY_WORKERS_ENABLED: "false"
      RELAY_RECOVERY_ENABLED: "true"
      RELAY_WORKER_COUNT: "0"
      RELAY_ALLOWED_ORIGINS: http://localhost:8080
      DB_POOL_SIZE: "12"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  relay-worker-a:
    build:
      context: ./backend
    environment:
      RELAY_DB_URL: jdbc:postgresql://postgres:5432/relay
      RELAY_DB_USER: relay
      RELAY_DB_PASSWORD: relay
      RELAY_WORKERS_ENABLED: "true"
      RELAY_RECOVERY_ENABLED: "false"
      RELAY_WORKER_COUNT: "4"
      SPRING_MAIN_WEB_APPLICATION_TYPE: none
      DB_POOL_SIZE: "8"
    depends_on:
      postgres:
        condition: service_healthy

  relay-worker-b:
    build:
      context: ./backend
    environment:
      RELAY_DB_URL: jdbc:postgresql://postgres:5432/relay
      RELAY_DB_USER: relay
      RELAY_DB_PASSWORD: relay
      RELAY_WORKERS_ENABLED: "true"
      RELAY_RECOVERY_ENABLED: "false"
      RELAY_WORKER_COUNT: "4"
      SPRING_MAIN_WEB_APPLICATION_TYPE: none
      DB_POOL_SIZE: "8"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  relay-distributed-postgres:
